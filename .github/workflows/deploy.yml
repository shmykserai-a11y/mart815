name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Checkout Hogwarts
        uses: actions/checkout@v4
        with:
          repository: shmykserai-a11y/hogwarts
          ref: dev
          path: hogwarts

      - name: Install Hogwarts dependencies
        working-directory: hogwarts
        run: npm ci

      - name: Build Hogwarts (static export)
        working-directory: hogwarts
        env:
          NEXT_PUBLIC_BASE_PATH: /hogwarts
        run: npm run build

      - name: Bundle Hogwarts under /hogwarts
        run: |
          rm -rf dist/hogwarts
          mkdir -p dist/hogwarts
          cp -R hogwarts/out/. dist/hogwarts/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
